import groovy.json.JsonSlurper
import java.util.concurrent.TimeUnit

ext.ExpensiLog = new Object() {
    private final String BLUE = "[34m"
    private final String YELLOW = "[33m"
    private final String RED = "[31m"
    private final String RESET = "[0m"

    private String prefix = ""
    void setPrefix(String newPrefix) { this.prefix = newPrefix }

    private String format(String color, String message) {
        return "${color}[${prefix}] ${message}${this.RESET}"
    }

    void lifecycle(String message) { logger.lifecycle(format(this.BLUE, message)) }
    void warn(String message)      { logger.warn(format(this.YELLOW, message)) }
    void error(String message)     { logger.error(format(this.RED, message)) }
}

ext.ExpensiUtils = new Object() {
    Map runCommand(List command, long timeoutSeconds = 10, File workingDir = null) {
        def process = workingDir ? command.execute(null, workingDir) : command.execute()
        process.waitFor(timeoutSeconds, TimeUnit.SECONDS)
        return [output: process.in.text?.trim(), exitCode: process.exitValue()]
    }

    // Returns [buildFromSource, version, githubUsername, githubToken]; any failure -> build from source.
    Map resolveArtifacts(String packageName, String newDotRootDir, boolean isHybrid) {
        def cmd = [
            "bun", "${newDotRootDir}/scripts/artifacts-utils/resolve-artifacts.ts",
            "--platform=android", "--package=${packageName}", "--hybrid=${isHybrid}", "--new-dot-root=${newDotRootDir}"
        ]
        try {
            def result = runCommand(cmd, 120, new File(newDotRootDir))
            if (result.exitCode != 0) {
                ExpensiLog.error("Artifacts resolver failed (exit ${result.exitCode}). Building react-native from source.")
                return [buildFromSource: true, version: null]
            }
            return new JsonSlurper().parseText(result.output)
        } catch (Exception e) {
            ExpensiLog.error("Artifacts resolver error: ${e}. Building react-native from source.")
            return [buildFromSource: true, version: null]
        }
    }
}
