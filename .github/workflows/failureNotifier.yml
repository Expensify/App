name: Notify on Workflow Failure

on:
  workflow_run:
    workflows: ["Process new code merged to main", "Remote Build iOS", "Remote Build Android"]
    branches: [main]
    types:
      - completed

permissions:
  issues: write

jobs:
  notifyFailure:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Checkout
        # v1
        uses: getblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b # v1

      - name: Process Failed Jobs
        uses: ./.github/actions/javascript/failureNotifier
        with:
          GITHUB_TOKEN: ${{ github.token }}
