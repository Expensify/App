name: Validate Patches

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths: ['patches/**']

jobs:
  validate-patches:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1

      - name: Fetch main branch
        run: git fetch origin --depth=1 main

      - name: Run patch validator
        run: ./scripts/validatePatches.sh

  verify-expo-patches:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Verify Expo patches
        run: npm run verify-expo-patches
