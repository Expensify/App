name: Victory Chart Renderer Tests

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore: [staging, production]
    paths:
      - 'server/**'
      - 'src/**'
      - '.bun-version'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: ${{ github.ref }}-vcr-test
  cancel-in-progress: true

jobs:
  test:
    name: Test victory-chart-renderer
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Setup Bun
        # v2.2.0
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version-file: .bun-version

      - name: Build victory-chart-renderer Linux x64 binary
        run: npm run server:vcr:build:linux

      - name: Smoke-test compiled binary
        run: ./server/victory-chart-renderer/dist/victory-chart-renderer-linux-x64 --chart-xml "$(cat server/victory-chart-renderer/tests/fixtures/top-categories-6.xml)" --out /tmp/vcr-smoke.png && test -s /tmp/vcr-smoke.png

      - name: Run victory-chart-renderer unit tests
        working-directory: server/victory-chart-renderer
        run: bun test tests/stubExports.test.ts tests/resolveCanvasSize.test.ts
