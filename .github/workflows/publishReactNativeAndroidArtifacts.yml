name: Publish React Native Android Artifacts

on:
  workflow_dispatch:
    inputs:
      build_standalone:
        description: 'Build Standalone artifacts'
        required: false
        type: boolean
      build_hybridapp:
        description: 'Build HybridApp artifacts'
        required: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - package.json
      - patches/react-native+*.patch
      - patches/@react-native+*.patch
      - patches/react-native/react-native+*.patch
      - patches/react-native/@react-native+*.patch
      - Mobile-Expensify

jobs:
  verifyPatches:
    uses: ./.github/workflows/verifyReactNativePatches.yml
    with:
      platform: android
      ref_before: ${{ github.event.before || '' }}
      ref_after: ${{ github.event.after || '' }}
      build_standalone: ${{ github.event_name == 'workflow_dispatch' && inputs.build_standalone || false }}
      build_hybridapp: ${{ github.event_name == 'workflow_dispatch' && inputs.build_hybridapp || false }}
    secrets:
      OS_BOTIFY_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}

  buildAndPublishReactNativeArtifacts:
    name: Build and Publish React Native Artifacts
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: verifyPatches
    if: needs.verifyPatches.outputs.build_targets != ''
    strategy:
      # Disable fail-fast to prevent cancelling both jobs when only one needs to be stopped due to concurrency limits
      fail-fast: false
      matrix:
        # Dynamically build the matrix based on the build targets
        is_hybrid: ${{ fromJSON(needs.verifyPatches.outputs.build_targets) }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ matrix.is_hybrid }}
      cancel-in-progress: true
    steps:
      - name: Checkout Code
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: ${{ matrix.is_hybrid }}
          token: ${{ secrets.OS_BOTIFY_TOKEN }}

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode
        with:
          IS_HYBRID_BUILD: ${{ matrix.is_hybrid }}

      - name: Get Java version
        id: get-java-version
        uses: ./.github/actions/composite/getJavaVersion

      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12
        with:
          distribution: oracle
          java-version: ${{ steps.get-java-version.outputs.version }}

      # v6.1.0
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Determine new patched RN version
        id: getNewPatchedVersion
        uses: ./.github/actions/composite/determineNewPatchedRNVersion
        with:
          artifact_id: react-android
          is_hybrid_build: ${{ matrix.is_hybrid }}

      - name: Build and publish React Native artifacts
        working-directory: ${{ matrix.is_hybrid == 'true' && 'Mobile-Expensify/Android' || 'android' }}
        run: |
          echo "Starting artifacts build for ${{ matrix.is_hybrid == 'true' && 'HybridApp' || 'NewDot Standalone' }}"
          echo "Version: ${{ env.PATCHED_VERSION }}"
          echo "Patches hash: ${{ env.PATCHES_HASH }}"
          export ORG_GRADLE_PROJECT_reactNativeArchitectures="armeabi-v7a,arm64-v8a,x86,x86_64"

          # Exclude ktfmt and test tasks from the included react-native build
          EXCLUDE_TASKS=(
            -x :react-native:packages:react-native:ReactAndroid:ktfmtCheck
            -x :react-native:packages:react-native:ReactAndroid:ktfmtCheckMain
            -x :react-native:packages:react-native:ReactAndroid:ktfmtCheckScripts
            -x :react-native:packages:react-native:ReactAndroid:testDebugOptimizedUnitTest
            -x :react-native:packages:react-native:ReactAndroid:testDebugUnitTest
            -x :react-native:packages:react-native:ReactAndroid:testReleaseUnitTest
          )

          ./gradlew buildReactNativeArtifacts -PpatchedArtifacts.forceBuildFromSource=true -x lint -x test -x check "${EXCLUDE_TASKS[@]}"
          ./gradlew publishReactNativeArtifacts -PpatchedArtifacts.forceBuildFromSource=true
        env:
          GH_PUBLISH_ACTOR: ${{ github.actor }}
          GH_PUBLISH_TOKEN: ${{ github.token }}
          IS_HYBRID_BUILD: ${{ matrix.is_hybrid }}
          PATCHED_VERSION: ${{ steps.getNewPatchedVersion.outputs.NEW_PATCHED_VERSION }}
          PATCHES_HASH: ${{ matrix.is_hybrid == 'true' && needs.verifyPatches.outputs.hybrid_app_patches_hash || needs.verifyPatches.outputs.standalone_patches_hash }}
          CMAKE_VERSION: 3.31.6

      - name: Announce failed workflow in Slack
        if: ${{ failure() }}
        uses: ./.github/actions/composite/announceFailedWorkflowInSlack
        with:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          CHANNEL: '#expensify-open-source'
