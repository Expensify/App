name: Validate Mobile-Expensify submodule

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - 'Mobile-Expensify'

jobs:
  validate-mobile-expensify-submodule:
    if: github.actor != 'OSBotify' && !endsWith(github.actor, '[bot]')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout App
        uses: useblacksmith/checkout@1c9394c220d293645707b625ba9d79685f093a8f # v1

      - name: Checkout Mobile-Expensify
        uses: useblacksmith/checkout@1c9394c220d293645707b625ba9d79685f093a8f # v1
        with:
          repository: Expensify/Mobile-Expensify
          path: .github/mobile-expensify-repo
          token: ${{ secrets.OS_BOTIFY_TOKEN }}
          # We only read the default-branch HEAD SHA (git rev-parse HEAD), never file contents,
          # so skip downloading blobs and check out only the repo root to avoid materializing the tree.
          filter: blob:none
          sparse-checkout: .
          sparse-checkout-cone-mode: false

      - name: Validate submodule pointer
        env:
          MOBILE_EXPENSIFY_GIT_DIR: .github/mobile-expensify-repo
        run: ./scripts/validateMobileExpensifySubmodule.sh
