# Reminder: If this workflow's name changes, update the name in the dependent workflow at .github/workflows/failureNotifier.yml.
name: Process new code merged to main

on:
  push:
    branches: [main]
    paths-ignore: [docs/**, help/**, contributingGuides/**, jest/**, tests/**]

jobs:
  typecheck:
    uses: ./.github/workflows/typecheck.yml

  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  prettier:
    uses: ./.github/workflows/prettier.yml

  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  confirmPassingBuild:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [typecheck, lint, test]
    if: ${{ always() }}

    steps:
      - uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1

      - name: Exit failed workflow
        if: ${{ needs.typecheck.result == 'failure' || needs.lint.result == 'failure' || needs.test.result == 'failure' }}
        run: |
          echo "Checks failed, exiting ~ typecheck: ${{ needs.typecheck.result }}, lint: ${{ needs.lint.result }}, test: ${{ needs.test.result }}"
          exit 1

  chooseDeployActions:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: confirmPassingBuild
    outputs:
      MERGED_PR: ${{ steps.getMergedPullRequest.outputs.number }}
      SHOULD_DEPLOY: ${{ fromJSON(steps.shouldDeploy.outputs.SHOULD_DEPLOY) }}

    steps:
      - uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1

      - name: Get merged pull request
        id: getMergedPullRequest
        uses: ./.github/actions/composite/getMergedPullRequest
        with:
          github_token: ${{ github.token }}

      - name: Check if deploy checklist is locked
        id: isDeployChecklistLocked
        uses: ./.github/actions/javascript/isDeployChecklistLocked
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check if production release exists for last deploy checklist version
        id: hasProductionRelease
        run: |
          # Find most recent closed deploy checklist
          ISSUE_BODY=$(gh api "/repos/${{ github.repository }}/issues" \
            -X GET \
            -f labels="StagingDeployCash" \
            -f state=closed \
            -f sort=updated \
            -f direction=desc \
            -f per_page=1 \
            --jq '.[0].body')

          if [[ -z "$ISSUE_BODY" || "$ISSUE_BODY" == "null" ]]; then
            echo "No closed deploy checklist found, continuing with deploy"
            echo "HAS_PRODUCTION_RELEASE=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract the version (X.Y.Z or X.Y.Z-N) from the checklist body.
          # The body contains a line like: **Release Version:** `1.2.3-4-staging`
          # The regex stops before "-staging" because the optional 4th group only matches digits.
          VERSION=$(grep -oP '\d+\.\d+\.\d+(?:-\d+)?' <<< "$ISSUE_BODY" | head -1)
          if [[ -z "$VERSION" ]]; then
            echo "Could not extract version from closed deploy checklist, continuing with deploy"
            echo "HAS_PRODUCTION_RELEASE=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Last closed deploy checklist references version: $VERSION"

          # Production releases use the bare version as the tag (staging releases append "-staging"
          # and are marked as pre-releases). Look for a non-prerelease release with this tag.
          IS_PRERELEASE=$(gh api "/repos/${{ github.repository }}/releases/tags/$VERSION" \
            --jq '.prerelease' 2>/dev/null || echo "not_found")

          if [[ "$IS_PRERELEASE" == "false" ]]; then
            echo "Found production release for version $VERSION"
            echo "HAS_PRODUCTION_RELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "No production release found for version $VERSION (status: $IS_PRERELEASE), skipping deploy"
            echo "HAS_PRODUCTION_RELEASE=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check if merged pull request should trigger a deploy
        id: shouldDeploy
        run: |
          if gh api /orgs/Expensify/teams/mobile-deployers/memberships/${{ github.actor }} --silent; then
            echo "SHOULD_DEPLOY=${{ (!fromJSON(steps.isDeployChecklistLocked.outputs.IS_LOCKED) && github.actor != 'OSBotify' && fromJSON(steps.hasProductionRelease.outputs.HAS_PRODUCTION_RELEASE)) }}" >> "$GITHUB_OUTPUT"
          else
            echo "SHOULD_DEPLOY=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}

  skipDeploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: chooseDeployActions
    if: ${{ !fromJSON(needs.chooseDeployActions.outputs.SHOULD_DEPLOY) && github.actor != 'OSBotify' }}
    steps:
      - name: Comment on deferred PR
        run: |
          gh pr comment ${{ needs.chooseDeployActions.outputs.MERGED_PR }} --repo ${{ github.repository }} --body "$(cat <<'EOF'
          :hand: This PR was not deployed to staging yet because QA is ongoing. It will be automatically deployed to staging after the next production release.
          EOF
          )"
        env:
          GITHUB_TOKEN: ${{ secrets.OS_BOTIFY_TOKEN }}

  createNewVersion:
    needs: chooseDeployActions
    if: ${{ fromJSON(needs.chooseDeployActions.outputs.SHOULD_DEPLOY) }}
    uses: ./.github/workflows/createNewVersion.yml
    secrets: inherit

  updateStaging:
    needs: [chooseDeployActions, createNewVersion]
    uses: ./.github/workflows/updateProtectedBranch.yml
    secrets: inherit
    with:
      TARGET_BRANCH: staging
