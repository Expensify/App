name: agent-device Run (Android emulator)

# Reusable Android device job. Boots an Android emulator on a default
# GitHub-hosted ubuntu-latest runner (KVM-accelerated), downloads the POC
# APK, and hands control to scripts/ci/agent-device-qa.sh which drives
# agent-device through sign-in plus a QA-step-derived scenario.
#
# This workflow is intentionally Android-only and uses a static APK URL
# for the POC. See .github/workflows/README-agent-device-poc.md for the
# documented TODOs (per-PR artifact, iOS, OTP hardening, etc).

on:
  workflow_call:
    inputs:
      pr:
        description: 'PR number to run against'
        required: true
        type: string
      head_sha:
        description: 'PR head SHA (for the GitHub check)'
        required: false
        type: string
        default: ''
      qa_steps:
        description: 'PR QA Steps body extracted by the dispatcher'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

env:
  # APK URL is provided via the POC_APK_URL repository secret so it can
  # be rotated without touching code. The full design swaps the static
  # URL for the per-PR buildAdHoc.yml artifact.
  AGENT_DEVICE_VERSION: '0.15.2'
  EMULATOR_API_LEVEL: '33'
  EMULATOR_ARCH: x86_64
  EMULATOR_TARGET: google_apis
  EMULATOR_PROFILE: pixel_6

jobs:
  android:
    name: Android emulator sanity
    runs-on: ubuntu-latest
    # Free runner emulator boot can take 5-10 min; cold install + sign-in
    # + QA-step walk can push toward 50 min. Headroom on top of that.
    timeout-minutes: 60
    env:
      PR_NUMBER: ${{ inputs.pr }}
      HEAD_SHA: ${{ inputs.head_sha }}
      QA_STEPS: ${{ inputs.qa_steps }}
      ARTIFACTS_DIR: ${{ github.workspace }}/out
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1
        with:
          fetch-depth: 1

      - name: Free up disk space on the runner
        # Trim the largest preinstalled toolchains we don't need before
        # the Android SDK install. We deliberately do NOT remove
        # /usr/local/lib/android because android-actions/setup-android
        # runs as the non-root runner user and cannot recreate that
        # path (EACCES on mkdir).
        run: |
          set -eux
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc \
                      /usr/local/share/boost \
                      /usr/local/share/powershell /usr/share/swift || true
          sudo apt-get clean
          df -h /

      - name: Enable KVM (hardware acceleration)
        # Per Google's android-emulator-runner README - this exposes /dev/kvm
        # to the runner user so the emulator can use hardware acceleration.
        run: |
          set -eux
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          # Fail fast with a clear infra message if /dev/kvm is missing.
          if [ ! -e /dev/kvm ]; then
            echo "::error title=Infra failure::/dev/kvm is not available on this runner; the emulator cannot run with hardware acceleration."
            exit 1
          fi
          ls -l /dev/kvm

      - name: Set up Node
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'

      - name: Install agent-device CLI
        run: |
          set -eux
          npm install -g "agent-device@${AGENT_DEVICE_VERSION}"
          agent-device --version

      - name: Install Cursor Agent CLI (for QA-step runner)
        # Used by the qa-runner step inside the script to map free-form QA
        # Steps to .ad flows or improvise agent-device actions.
        # Installer: https://cursor.com/docs/cli/headless
        run: |
          set -eu
          curl -fsSL https://cursor.com/install | bash
          # The installer drops cursor-agent into ~/.local/bin by default.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # Smoke test with the new PATH for this shell only.
          export PATH="$HOME/.local/bin:$PATH"
          cursor-agent --version || true

      - name: Download POC APK
        env:
          POC_APK_URL: ${{ secrets.POC_APK_URL }}
        run: |
          set -eu
          if [ -z "${POC_APK_URL:-}" ]; then
            echo "::error title=Missing secret::POC_APK_URL repository secret is not set; cannot download the APK."
            exit 1
          fi
          mkdir -p apk
          curl -fSL --retry 3 --retry-delay 5 \
            -o apk/Expensify-adhoc.apk "$POC_APK_URL"
          ls -lh apk/Expensify-adhoc.apk

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install build-tools (for aapt2)
        run: |
          set -eux
          sdkmanager --install "build-tools;34.0.0" >/dev/null
          # Expose aapt2 on PATH for the bundle-id detection step.
          echo "$ANDROID_HOME/build-tools/34.0.0" >> "$GITHUB_PATH"

      - name: Detect bundle id from APK
        id: bundle
        run: |
          set -eux
          BUNDLE_ID="$(aapt2 dump packagename apk/Expensify-adhoc.apk)"
          echo "Detected bundle id: $BUNDLE_ID"
          echo "BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"

      - name: AVD cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.EMULATOR_API_LEVEL }}-${{ env.EMULATOR_ARCH }}-${{ env.EMULATOR_TARGET }}-v1

      - name: Create AVD + warm snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed # v2.34.0
        with:
          api-level: ${{ env.EMULATOR_API_LEVEL }}
          arch: ${{ env.EMULATOR_ARCH }}
          target: ${{ env.EMULATOR_TARGET }}
          profile: ${{ env.EMULATOR_PROFILE }}
          ram-size: 3072
          heap-size: 576
          disk-size: 6G
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          disable-animations: false
          script: echo "AVD warmed and snapshot saved."

      - name: Make qa script executable
        run: chmod +x scripts/ci/agent-device-qa.sh

      - name: Run agent-device QA on emulator
        id: qa
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed # v2.34.0
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          APK_PATH: ${{ github.workspace }}/apk/Expensify-adhoc.apk
          ARTIFACTS_DIR: ${{ github.workspace }}/out
          PR_NUMBER: ${{ inputs.pr }}
          QA_STEPS: ${{ inputs.qa_steps }}
        with:
          api-level: ${{ env.EMULATOR_API_LEVEL }}
          arch: ${{ env.EMULATOR_ARCH }}
          target: ${{ env.EMULATOR_TARGET }}
          profile: ${{ env.EMULATOR_PROFILE }}
          ram-size: 3072
          heap-size: 576
          disk-size: 6G
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect -camera-back none
          disable-animations: true
          script: ./scripts/ci/agent-device-qa.sh

      - name: Upload evidence (JUnit + screenshots + video + logs)
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: agent-device-evidence-pr-${{ inputs.pr }}
          path: out/
          if-no-files-found: warn
          retention-days: 7

      - name: Publish JUnit results
        if: always() && hashFiles('out/junit.xml') != ''
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
        with:
          report_paths: 'out/junit.xml'
          check_name: 'agent-device (Android)'
          fail_on_failure: false
          require_tests: false
          commit: ${{ inputs.head_sha }}

      - name: Post results comment on PR
        # Always best-effort: never let comment posting failures turn an
        # otherwise-green job red, and never let early-step failures
        # block this step from running.
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ steps.qa.outcome }}
        run: |
          set -eu
          mkdir -p out
          SUMMARY_FILE="out/summary.md"
          if [ -f "$SUMMARY_FILE" ]; then
            BODY="$(cat "$SUMMARY_FILE")"
          else
            BODY="agent-device sanity run produced no summary (the QA script never ran - check the job log for the first failing step)."
          fi

          STATUS_LINE="**Status:** \`$OUTCOME\` · [run logs]($RUN_URL) · [download evidence](${RUN_URL}#artifacts)"
          {
            echo "## agent-device sanity (Android POC)"
            echo
            echo "$STATUS_LINE"
            echo
            echo "$BODY"
          } > out/_pr_comment.md

          # `gh pr comment` errors if the PR number doesn't exist on this
          # repo; swallow that so a placeholder pr=1 dispatch still finishes
          # cleanly. The summary remains visible in the job log + artifact.
          if ! gh pr comment "$PR_NUMBER" --body-file out/_pr_comment.md; then
            echo "::warning title=Comment skipped::Could not post comment on PR #$PR_NUMBER (likely no such PR). Summary written to out/_pr_comment.md instead."
          fi
