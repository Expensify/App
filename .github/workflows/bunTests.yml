name: Bun tests

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore: [staging, production]
    paths:
      - 'server/**'
      - 'src/**'
      - '.github/libs/**'
      - 'scripts/utils/Git.ts'
      - 'scripts/utils/esmGithubDeps.ts'
      - 'tests/unit/awaitStagingDeploysTest.ts'
      - 'tests/unit/checkDeployBlockersTest.ts'
      - 'tests/unit/CIGitLogicTest.ts'
      - 'tests/unit/createOrUpdateDeployChecklistTest.ts'
      - 'tests/unit/DeployChecklistUtilsTest.ts'
      - 'tests/unit/getPullRequestIncrementalChangesTest.ts'
      - 'tests/unit/GithubUtilsTest.ts'
      - 'tests/unit/GitUtilsTest.ts'
      - 'tests/unit/isAuthorizedContributorTest.ts'
      - 'tests/unit/isDeployChecklistLockedTest.ts'
      - 'tests/unit/markPullRequestsAsDeployedTest.ts'
      - 'tests/unit/postOrReplaceComment.ts'
      - 'tests/unit/waitForPreviousRunsTest.ts'
      - 'bunfig.toml'
      - '.bun-version'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/bunTests.yml'

concurrency:
  group: ${{ github.ref }}-bun-tests
  cancel-in-progress: true

jobs:
  test:
    name: Bun tests
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: useblacksmith/checkout@c9796daa2a4bdebdab5bd16be2c09a70cd4e1121 # v1

      - name: Setup Node
        uses: ./.github/actions/composite/setupNode

      - name: Run Bun tests
        run: npm run test:bun

      - name: Run Bun tests for GitHub scripts/actions libs
        run: npm run test:bun:scripts

      - name: Build victory-chart-renderer Linux x64 binary
        run: npm run server:vcr:build:linux

      - name: Smoke-test compiled victory-chart-renderer binary
        run: ./server/victory-chart-renderer/dist/victory-chart-renderer-linux-x64 --chart-xml "$(cat server/victory-chart-renderer/tests/fixtures/top-categories-6.xml)" --out /tmp/vcr-smoke.png && test -s /tmp/vcr-smoke.png
