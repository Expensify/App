name: Knip check

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore: [staging, production]
    paths:
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
      - '**.mjs'
      - '**.cjs'
      - 'knip.json'
      - 'package.json'
      - 'package-lock.json'
      - 'patches/**'
      - 'tsconfig.json'

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && format('{0}-{1}', github.ref, github.sha) || github.ref }}-knip
  cancel-in-progress: true

jobs:
  knip-compare:
    name: Compare knip issues against main
    if: ${{ github.actor != 'OSBotify' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout PR
        # v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Capture PR ref
        id: pr-ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node (PR)
        uses: ./.github/actions/composite/setupNode

      - name: Run knip on PR
        run: npm run knip:json > /tmp/knip-pr.json
        env:
          CI: true

      - name: Checkout main
        run: |
          git fetch origin main --no-tags --depth=1
          git checkout origin/main

      - name: Setup Node (main)
        uses: ./.github/actions/composite/setupNode

      - name: Run knip on main
        run: npm run knip:json > /tmp/knip-main.json
        env:
          CI: true

      - name: Restore PR workspace
        run: git checkout ${{ steps.pr-ref.outputs.sha }}

      - name: Compare reports
        run: npx ts-node .github/scripts/compareKnipReports.ts /tmp/knip-main.json /tmp/knip-pr.json
