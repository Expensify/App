name: Set up Node (StickyDisk)
description: |
  Set up Node, mounting node_modules/~/.npm via Blacksmith Sticky Disks instead of actions/cache.
  Blacksmith-runner-only (Ubuntu); not used on macOS jobs pending confirmation of sticky disk
  support there — those still use ./setupNode.

  Sticky disks have no cache-hit output (unlike actions/cache), so "was this disk freshly
  created" is inferred from a marker file (.stickydisk-installed) written after a successful
  npm ci. The disk key includes the lockfile hash, so a dependency change mounts a brand new
  (empty) disk automatically — mirroring actions/cache's key-based invalidation.

inputs:
  IS_HYBRID_BUILD:
    description: 'Indicates if node is set up for hybrid app'
    required: false
    default: 'false'

outputs:
  cache-hit:
    description: Was there a cache hit on the main node_modules?
    value: ${{ steps.check-node-modules.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Remove E/App version from package-lock.json
      shell: bash
      run: jq 'del(.version, .packages[""].version)' package-lock.json > normalized-package-lock.json

    - id: setup-node
      # v6.1.0
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
      with:
        node-version-file: '.nvmrc'

    # Mounts a persistent NVMe-backed disk at node_modules. Key hashes normalized-package-lock.json
    # (app version stripped by the jq step above), not the raw lockfile, so routine version bumps —
    # which change package-lock.json on every deploy/main-merge but not the actual dependency tree —
    # do NOT invalidate the disk. Only a real dependency or patch change mounts a fresh (empty) disk.
    - id: stickydisk-node-modules
      uses: useblacksmith/stickydisk@6d373c96a74cbde0c99fedc5ea5d3a7ba66ba494 # v1.4.0
      with:
        key: ${{ inputs.IS_HYBRID_BUILD == 'true' && format('{0}-node-modules-{1}', github.repository, hashFiles('normalized-package-lock.json', 'patches/**', 'Mobile-Expensify/patches/**')) || format('{0}-node-modules-{1}', github.repository, hashFiles('normalized-package-lock.json', 'patches/**')) }}
        path: node_modules

    - id: stickydisk-old-dot-node-modules
      if: inputs.IS_HYBRID_BUILD == 'true'
      uses: useblacksmith/stickydisk@6d373c96a74cbde0c99fedc5ea5d3a7ba66ba494 # v1.4.0
      with:
        key: ${{ format('{0}-node-modules-{1}', github.repository, hashFiles('Mobile-Expensify/package-lock.json', 'Mobile-Expensify/patches/**')) }}
        path: Mobile-Expensify/node_modules

    # No cache-hit output from stickydisk, so infer it from a marker written after a successful
    # npm ci. A freshly-created (empty) disk mounted under a new key has no marker -> miss.
    - id: check-node-modules
      shell: bash
      run: |
        if [ -f node_modules/.stickydisk-installed ]; then
          echo "cache-hit=true" >> "$GITHUB_OUTPUT"
        else
          echo "cache-hit=false" >> "$GITHUB_OUTPUT"
        fi

    - id: check-old-dot-node-modules
      if: inputs.IS_HYBRID_BUILD == 'true'
      shell: bash
      run: |
        if [ -f Mobile-Expensify/node_modules/.stickydisk-installed ]; then
          echo "cache-hit=true" >> "$GITHUB_OUTPUT"
        else
          echo "cache-hit=false" >> "$GITHUB_OUTPUT"
        fi

    # Mounted once, unconditionally: sticky disks are near-instant to mount (no download), so
    # there's no equivalent of the "skip on hit" bandwidth-saving trick used for actions/cache.
    - id: stickydisk-npm
      uses: useblacksmith/stickydisk@6d373c96a74cbde0c99fedc5ea5d3a7ba66ba494 # v1.4.0
      with:
        key: ${{ format('{0}-npm', github.repository) }}
        path: ~/.npm

    - name: Remove ND node_modules if needed for hybrid app build
      if: inputs.IS_HYBRID_BUILD == 'true' && steps.check-node-modules.outputs.cache-hit == 'true' && steps.check-old-dot-node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: rm -rf node_modules

    - name: Install root project node packages
      if: steps.check-node-modules.outputs.cache-hit != 'true' || (inputs.IS_HYBRID_BUILD == 'true' && steps.check-old-dot-node-modules.outputs.cache-hit != 'true')
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: npm ci

    # Mark this disk as installed so the next job that mounts the same key (same lockfile hash)
    # skips npm ci. Runs even when Install step was skipped (already marked) — cheap no-op then.
    - name: Mark node_modules disk as installed
      shell: bash
      run: touch node_modules/.stickydisk-installed
